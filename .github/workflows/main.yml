name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run prek checks
        uses: j178/prek-action@v2

      - name: Run remaining checks
        run: |
          echo "🚀 Checking lock file consistency with 'pyproject.toml'"
          uv lock --locked
          echo "🚀 Static type checking: Running ty"
          uv run ty check

  tests-and-type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests --cov --cov-branch --cov-config=pyproject.toml --cov-report=xml

      - name: Check typing
        run: uv run ty check

      - name: Upload coverage reports to Codecov with GitHub Action on Python 3.11
        uses: codecov/codecov-action@v7
        if: ${{ matrix.python-version == '3.11' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-docs:
    runs-on: ubuntu-latest
    # Full render on main executes real MCMC; smoke render on PRs is fast.
    timeout-minutes: 60
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install docs dependencies
        run: uv sync --frozen --group docs

      - name: Register Jupyter kernel
        run: uv run python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Restore notebook execution cache
        # Unique key per run so the cache is ALWAYS re-saved (actions/cache
        # refuses to overwrite an existing key). Combined with jupyter-cache's
        # own content-hash invalidation, this makes the cache accumulate every
        # successfully executed notebook instead of freezing partial progress.
        uses: actions/cache@v4
        with:
          path: |
            docs/_build/.jupyter_cache
            docs/_build/.jupyter_cache_ci
          key: jupyter-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            jupyter-cache-

      - name: Build documentation
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "Production build: full-fidelity render (real MCMC), resilient."
            # Not -W here: the deploy must not be blocked by a warning or a
            # single slow/failed MCMC notebook. Cached notebooks render real
            # figures; anything that fails execution renders an error cell but
            # the site still deploys. The PR build below stays strict.
            IMPULSO_DOCS_RESILIENT=1 uv run sphinx-build --keep-going -b html docs docs/_build/html
          else
            echo "PR build: fast smoke render (strict)."
            make docs-ci
          fi

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  docs-linkcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install docs dependencies
        run: uv sync --frozen --group docs

      - name: Check external links (no notebook execution)
        run: uv run --group docs sphinx-build -b linkcheck -D nb_execution_mode=off docs docs/_build/linkcheck

  deploy-docs-preview:
    if: github.event_name == 'pull_request'
    needs: build-docs
    runs-on: ubuntu-latest
    concurrency:
      group: docs-preview-${{ github.head_ref }}
      cancel-in-progress: true
    environment:
      name: docs-preview
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy preview
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          preview: true

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, tests-and-type-check, build-docs]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v5
