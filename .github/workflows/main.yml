name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run prek checks
        uses: j178/prek-action@v2

      - name: Run remaining checks
        run: |
          echo "🚀 Checking lock file consistency with 'pyproject.toml'"
          uv lock --locked
          echo "🚀 Static type checking: Running ty"
          uv run ty check

  tests-and-type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests --cov --cov-branch --cov-config=pyproject.toml --cov-report=xml

      - name: Check typing
        run: uv run ty check

      - name: Upload coverage reports to Codecov with GitHub Action on Python 3.11
        uses: codecov/codecov-action@v5
        if: ${{ matrix.python-version == '3.11' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  check-notebook-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check rendered output is up to date
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          NOTEBOOKS=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'docs/tutorials/*.qmd' | grep -v '^$' || true)
          if [ -z "$NOTEBOOKS" ]; then
            echo "No .qmd files changed — skipping freshness check."
            exit 0
          fi
          MISSING=""
          for qmd in $NOTEBOOKS; do
            md="${qmd%.qmd}.md"
            if ! git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- "$md" | grep -q .; then
              MISSING="$MISSING\n  $qmd changed but $md was not updated"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Rendered notebook output is stale:$MISSING"
            echo ""
            echo "Run locally:  make docs-render"
            echo "Then commit:  git add docs/tutorials/*.md docs/tutorials/*_files/"
            exit 1
          fi
          echo "All changed notebooks have updated rendered output."

  smoke-render-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - notebook: quickstart
            ci_param: false
          - notebook: forecasting
            ci_param: false
          - notebook: structural-analysis
            ci_param: false
          - notebook: monetary-policy
            ci_param: true
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render notebook
        run: |
          ARGS=""
          if [ "${{ matrix.ci_param }}" = "true" ]; then
            ARGS="-P ci:true"
          fi
          quarto render docs/tutorials/${{ matrix.notebook }}.qmd $ARGS
        env:
          QUARTO_PYTHON: .venv/bin/python

  build-docs:
    runs-on: ubuntu-latest
    needs: [smoke-render-notebooks]
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Build documentation
        run: uv run zensical build

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-docs-preview:
    if: github.event_name == 'pull_request'
    needs: build-docs
    runs-on: ubuntu-latest
    concurrency:
      group: docs-preview-${{ github.head_ref }}
      cancel-in-progress: true
    environment:
      name: docs-preview
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, tests-and-type-check, build-docs, check-notebook-freshness]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4
