name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run prek checks
        uses: j178/prek-action@v2

      - name: Run remaining checks
        run: |
          echo "🚀 Checking lock file consistency with 'pyproject.toml'"
          uv lock --locked
          echo "🚀 Static type checking: Running ty"
          uv run ty check

  tests-and-type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: uv run python -m pytest tests --cov --cov-branch --cov-config=pyproject.toml --cov-report=xml

      - name: Check typing
        run: uv run ty check

      - name: Upload coverage reports to Codecov with GitHub Action on Python 3.11
        uses: codecov/codecov-action@v5
        if: ${{ matrix.python-version == '3.11' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  render-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        notebook: [quickstart, forecasting, structural-analysis, monetary-policy]
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Cache Quarto freeze
        uses: actions/cache@v4
        with:
          path: _freeze/docs/tutorials/${{ matrix.notebook }}
          key: quarto-freeze-${{ matrix.notebook }}-${{ hashFiles(format('docs/tutorials/{0}.qmd', matrix.notebook)) }}
          restore-keys: |
            quarto-freeze-${{ matrix.notebook }}-

      - name: Render notebook
        run: quarto render docs/tutorials/${{ matrix.notebook }}.qmd
        env:
          QUARTO_PYTHON: .venv/bin/python

      - name: Upload rendered output
        uses: actions/upload-artifact@v4
        with:
          name: notebook-${{ matrix.notebook }}
          path: |
            docs/tutorials/${{ matrix.notebook }}.md
            docs/tutorials/${{ matrix.notebook }}_files/
          if-no-files-found: error

  build-docs:
    runs-on: ubuntu-latest
    needs: render-notebooks
    timeout-minutes: 10
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Download rendered notebooks
        uses: actions/download-artifact@v4
        with:
          path: docs/tutorials
          pattern: notebook-*
          merge-multiple: true

      - name: Build documentation
        run: uv run zensical build

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-docs-preview:
    if: github.event_name == 'pull_request'
    needs: build-docs
    runs-on: ubuntu-latest
    concurrency:
      group: docs-preview-${{ github.head_ref }}
      cancel-in-progress: true
    environment:
      name: docs-preview
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

  deploy-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, tests-and-type-check, build-docs]
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@v4
