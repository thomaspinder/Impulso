name: Full Notebook Render

on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  issues: write

jobs:
  full-render:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install docs dependencies
        run: uv sync --frozen --group docs

      - name: Register Jupyter kernel
        run: uv run python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Full render (real MCMC, warnings as errors)
        run: uv run sphinx-build -W --keep-going -b html docs docs/_build/html

  open-issue-on-failure:
    runs-on: ubuntu-latest
    needs: full-render
    if: failure()
    steps:
      - name: Open GitHub issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = `Notebook full render failed (${context.runNumber})`;
            const body = [
              '## Full notebook render failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Trigger:** ${context.eventName}`,
              `**Date:** ${new Date().toISOString().split('T')[0]}`,
              '',
              'One or more notebooks failed to render with full MCMC sampling.',
              'Check the workflow logs for details.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'notebooks'],
            });
