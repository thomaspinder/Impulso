name: Full Notebook Render

on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 02:00 UTC
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  issues: write

jobs:
  full-render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        notebook: [quickstart, forecasting, structural-analysis, monetary-policy]
      fail-fast: false
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render notebook (full, no CI flag)
        run: quarto render docs/tutorials/${{ matrix.notebook }}.qmd
        env:
          QUARTO_PYTHON: .venv/bin/python

  open-issue-on-failure:
    runs-on: ubuntu-latest
    needs: full-render
    if: failure()
    steps:
      - name: Open GitHub issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = `Notebook full render failed (${context.runNumber})`;
            const body = [
              '## Full notebook render failed',
              '',
              `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Trigger:** ${context.eventName}`,
              `**Date:** ${new Date().toISOString().split('T')[0]}`,
              '',
              'One or more notebooks failed to render with full MCMC sampling.',
              'Check the workflow logs for details.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci', 'notebooks'],
            });
